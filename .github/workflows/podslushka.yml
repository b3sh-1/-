name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: |
          printf 'y\n' | flet build apk подслушка.py --product "Подслушка"
        # Мы прямо сказали роботу: "Возьми файл подслушка.py и сделай из него приложение"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Podslushka-App
          path: build/apk/*.apk
