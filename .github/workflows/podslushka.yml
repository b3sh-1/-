name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flet
        run: pip install flet

      - name: Prepare main.py
        # Оставляем твой файл подслушка.py нетронутым
        run: cp podslushka.py main.py

      - name: Build APK (Silent Mode)
        # Флаг --no-interactive запрещает роботу спрашивать "Да/Нет"
        run: flet build apk --no-interactive

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Podslushka-App
          path: build/apk/*.apk
