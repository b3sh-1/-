name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flet
        run: pip install flet

      - name: Prepare main.py
        # Проверь, чтобы название файла совпадало (подслушка.py или Подслушка.py)
        run: cp podslushka.py main.py

      - name: Build APK
        # Параметр FLET_YES: "1" заставляет сборщик автоматически соглашаться со всем
        env:
          FLET_YES: "1"
        run: flet build apk --product "Подслушка"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Podslushka-App
          path: build/apk/*.apk
