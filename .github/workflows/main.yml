name: Build AP
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Flet
        run: pip install flet
      - name: Build APK
        run: |
          flet build apk --product "подслушка"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: подслушка
          path: build/apk/*.apk
